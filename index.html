<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Angie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/reservas.css">
</head>
<body>
    <!-- Botón de Reservas -->
    <button id="botonReservas" class="btn-reservas">
        📅 Hacer una Reserva
    </button>

    <!-- Modal de Reservas -->
    <div id="modalReservas" class="modal">
        <div class="modal-contenido">
            <span class="cerrar">&times;</span>
            <h2>Reservar en Mi Calendario</h2>
            
            <div id="loginContainer">
                <p>Inicia sesión con Google para continuar:</p>
                <button id="btnLoginGoogle" class="btn-google">
                    🔐 Iniciar sesión con Google
                </button>
            </div>

            <form id="formularioReservas" style="display: none;">
                <div class="form-grupo">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-grupo">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-grupo">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>

                <div class="form-grupo">
                    <label for="fecha">Fecha de Reserva:</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-grupo">
                    <label for="hora">Hora:</label>
                    <input type="time" id="hora" name="hora" required>
                </div>

                <div class="form-grupo">
                    <label for="duracion">Duración (minutos):</label>
                    <select id="duracion" name="duracion" required>
                        <option value="30">30 minutos</option>
                        <option value="60">1 hora</option>
                        <option value="90">1.5 horas</option>
                        <option value="120">2 horas</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="personas">Número de Personas:</label>
                    <input type="number" id="personas" name="personas" min="1" required>
                </div>

                <div class="form-grupo">
                    <label for="servicio">Tipo de Servicio:</label>
                    <select id="servicio" name="servicio" required>
                        <option value="">Selecciona un servicio</option>
                        <option value="Consulta">Consulta</option>
                        <option value="Sesión">Sesión</option>
                        <option value="Asesoramiento">Asesoramiento</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="mensaje">Mensaje Adicional:</label>
                    <textarea id="mensaje" name="mensaje" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-enviar">Agregar al Calendario</button>
                <button type="button" id="btnLogout" class="btn-logout">Cerrar Sesión</button>
            </form>

            <div id="mensajeEstado" class="mensaje-estado"></div>
        </div>
    </div>

    <!-- Google API Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    
    <!-- Tus Scripts -->
    <script src="script.js"></script>
    <script src="js/reservas.js"></script>
</body>
</html>
